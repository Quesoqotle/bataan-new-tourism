<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastronomy | Behold Bataan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
    <style>
        .hero {
            position: relative;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.5); 
        }

        .card-img-top {
            height: 250px;
            object-fit: cover;
        }

        .food-card {
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .food-card:hover {
            transform: translateY(-10px);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-3" href="index.html">
                <img src="images/seal.jpg" alt="Bataan seal" style="height: 40px;">
                <span class="fw-bold text-uppercase">Province of Bataan</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="destinations.html">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="culture.html">Culture</a></li>
                    <li class="nav-item"><a class="nav-link active" href="gastronomy.html">Gastronomy</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="tips.html">Travel Tips</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="inquiry.html">Inquiry</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero">
        <img src="images/dunsulanb.jpg" alt="Bataan Food" class="hero-bg">
        <div class="container" style="position: relative; z-index: 2;">
            <h1 class="display-2 fw-bold text-uppercase">Gastronomy</h1>
            <p class="lead">Savor the authentic flavors and local delicacies of Bataan</p>
        </div>
    </header>

    <main class="py-5 bg-light">
        <div class="container">
            <div class="row g-4 justify-content-center" id="foodContainer">
                </div>
        </div>
    </main>

    <footer class="bg-black text-white py-5">
        <div class="container text-center">
            <img src="images/footerball.png" alt="Logo" class="mb-3" style="height: 60px;">
            <p class="mb-1">© 2026 Bataan Tourism Project | BSIS 2-2</p>
            <p class="mb-0 small">Made by: <span class="fw-bold text-primary">Rhey Mark Iglesia</span></p>
        </div>
    </footer>

    <div class="modal fade" id="foodModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" id="modalContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const delicacies = [
            {
                name: "Tapa of Orion",
                city: "Orion",
                category: "Savory",
                image: "images/tinapa.jpg",
                shortDesc: "The famous smoked and dried beef unique to Orion.",
                fullDesc: "Orion's Tapa is renowned for its distinct curing process and deep flavor. Unlike typical commercial tapa, this local version is often preferred for its tenderness and the perfect balance of salty and savory notes.",
                bestPaired: "Garlic rice and vinegar with chili",
                tips: "Best bought early in the morning at the Orion Public Market."
            },
            {
                name: "Bagac Cashew",
                city: "Bagac",
                category: "Snacks",
                image: "images/kasoy.jpg",
                shortDesc: "Premium quality roasted cashews from the hills of Bagac.",
                fullDesc: "Bagac is famous for its cashew nuts, which are processed locally. From roasted nuts to cashew butter and sweets, these products represent the agricultural bounty of the town's upland areas.",
                bestPaired: "Great as a standalone snack or topping for desserts",
                tips: "Look for the 'roasted with skin' variety for a more traditional taste."
            },
            {
                name: "Araro Cookies",
                city: "Samal",
                category: "Dessert",
                image: "images/araro.jpg",
                shortDesc: "Traditional arrowroot cookies that melt in your mouth.",
                fullDesc: "Samal's Araro (Arrowroot) cookies are a heritage snack. Made from arrowroot flour, these cookies are light, powdery, and mildly sweet, known for their unique texture that instantly dissolves.",
                bestPaired: "Hot coffee or tea",
                tips: "These are fragile! Pack them carefully if you are bringing them home as pasalubong."
            },
            {
                name: "Suman",
                city: "Abucay",
                category: "Delicacy",
                image: "images/kakanin.jpg",
                shortDesc: "Sticky rice cakes wrapped in luyong or banana leaves.",
                fullDesc: "Abucay is known for its delicious Suman. Made from high-quality glutinous rice and coconut milk, these rice cakes are a staple for breakfast or merienda, representing the town's traditional cooking methods.",
                bestPaired: "Latik (coconut caramel) or ripe mangoes",
                tips: "The Suman sold near the Abucay Church is a favorite among travelers."
            }
        ];

        const container = document.getElementById('foodContainer');

        function renderFood() {
            container.innerHTML = delicacies.map((d, index) => `
                <div class="col-md-6 col-lg-3">
                    <div class="card h-100 shadow-sm border-0 food-card" onclick="viewDetails(${index})">
                        <img src="${d.image}" class="card-img-top" alt="${d.name}">
                        <div class="card-body text-center">
                            <h5 class="fw-bold mb-1">${d.name}</h5>
                            <p class="text-primary small mb-2">📍 ${d.city}</p>
                            <p class="card-text text-muted small">${d.shortDesc}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function viewDetails(index) {
            const d = delicacies[index];
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <img src="${d.image}" class="img-fluid rounded mb-4 w-100 shadow-sm" style="max-height: 400px; object-fit: cover;">
                    <h3 class="fw-bold">${d.name}</h3>
                    <p class="text-primary fw-bold">📍 ${d.city}, Bataan</p>
                    <hr>
                    <h5>Description</h5>
                    <p>${d.fullDesc}</p>
                    <div class="bg-light p-3 rounded mt-4">
                        <p class="mb-2"><strong>Best Paired With:</strong> ${d.bestPaired}</p>
                        <p class="mb-0"><strong>Pro Tip:</strong> ${d.tips}</p>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            `;
            
            const modalInstance = new bootstrap.Modal(document.getElementById('foodModal'));
            modalInstance.show();
        }

        renderFood();
    </script>
</body>
</html>
